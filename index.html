<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agro Forte</title>

<!-- Fonte bonita -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #f1f8f4;
  color: #2e2e2e;
}

/* HEADER /
header {
  background: #1b5e20;
  color: white;
  padding: 15px;
  display: flex;
  justify-content: space-between;
}

nav a {
  color: white;
  margin: 10px;
  text-decoration: none;
}

/ HERO /
.hero {
  text-align: center;
  padding: 100px 20px;
  background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
  url('https://images.unsplash.com/photo-1500382017468-9049fed747ef');
  color: white;
}

/ SEÇÕES /
section {
  padding: 40px;
  max-width: 900px;
  margin: auto;
}

/ BOTÕES /
button {
  background: #2e7d32;
  color: white;
  padding: 10px;
  border: none;
  border-radius: 8px;
}

/ INPUT /
input, textarea {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
}

/ CALCULADORA /
.barra {
  width: 100%;
  height: 20px;
  background: #ccc;
}

#nivel {
  height: 100%;
  width: 0%;
  background: green;
}

/ LOGIN /
#login {
  text-align: center;
  padding: 100px;
}

.hidden {
  display: none;
}

/ DARK MODE /
.dark {
  background: #121212;
  color: white;
}

footer {
  background: #1b5e20;
  color: white;
  text-align: center;
  padding: 10px;
}
</style>

</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>🌱 Agro Forte</h2>
  <input type="text" id="user" placeholder="Usuário">
  <input type="password" id="pass" placeholder="Senha">
  <button onclick="login()">Entrar</button>
  <p id="erro"></p>
</div>

<!-- SITE -->
<div id="site" class="hidden">

<header>
  <h1>🌾 Agro Forte</h1>
  <nav>
    <a href="#sobre">Sobre</a>
    <a href="#videos">Vídeos</a>
    <a href="#calc">Impacto</a>
    <a href="#contato">Contato</a>
  </nav>
  <button onclick="dark()">🌙</button>
</header>

<section class="hero">
  <h2>Futuro Sustentável 🌱</h2>
  <p>Equilíbrio entre produção e meio ambiente</p>
</section>

<section id="sobre">
  <h2>Sobre</h2>
  <p>O Agrinho promove educação e práticas sustentáveis no campo.</p>
</section>

<section id="videos">
  <h2>Vídeo Educativo</h2>
  <iframe width="100%" height="300"
  src="https://www.youtube.com/embed/2Vv-BfVoq4g"></iframe>
</section>

<section id="calc">
  <h2>🌍 Calculadora Ambiental</h2>

  <input type="number" id="agua" placeholder="Água/dia">
  <input type="number" id="energia" placeholder="Energia/dia">
  <input type="number" id="lixo" placeholder="Lixo/semana">

  <button onclick="calc()">Calcular</button>

  <div class="barra">
    <div id="nivel"></div>
  </div>

  <h3 id="res"></h3>
</section>

<section id="contato">
  <h2>Contato</h2>

  <form onsubmit="msg(event)">
    <input type="text" placeholder="Nome" required>
    <textarea placeholder="Mensagem"></textarea>
    <button>Enviar</button>
  </form>

  <p id="ok"></p>
</section>

<footer>
  <p>🌿 Agrinho Paraná 2026</p>
</footer>

</div>

<script>
function login() {
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if (u === "admin" && p === "1234") {
    document.getElementById("login").style.display = "none";
    document.getElementById("site").classList.remove("hidden");
  } else {
    document.getElementById("erro").innerText = "Login incorreto!";
  }
}

function dark() {
  document.body.classList.toggle("dark");
}

  e.preventDefault();
  document.getElementById("ok").innerText = "Mensagem enviada!";
}
</script>

</body>
</html>
