<section id="auth-section" class="auth-container" data-aos="fade-up">
    <div class="auth-card">
        <h2 id="auth-title">Acesso Restrito Agro-Tech</h2>
        <form id="auth-form">
            <input type="email" id="user-email" placeholder="Seu E-mail" required>
            <input type="password" id="user-pass" placeholder="Sua Senha" required>
            <button type="submit" id="btn-auth">Entrar / Cadastrar</button>
        </form>
        <p id="auth-message"></p>
    </div>
</section>

<section id="videos" class="video-gallery">
    <h2 class="section-title" data-aos="fade-right">Educação e Sustentabilidade</h2>
    <div class="video-grid">
        <div class="video-card" onclick="openVideo('https://www.youtube.com/embed/dQw4w9WgXcQ')">
            <div class="video-thumb" style="background-image: url('https://img.youtube.com/vi/dQw4w9WgXcQ/maxresdefault.jpg')">
                <span class="play-icon">▶</span>
            </div>
            <h3>O Futuro do Plantio Direto</h3>
        </div>
        <div class="video-card" onclick="openVideo('https://www.youtube.com/embed/dQw4w9WgXcQ')">
            <div class="video-thumb" style="background-image: url('https://img.youtube.com/vi/dQw4w9WgXcQ/mqdefault.jpg')">
                <span class="play-icon">▶</span>
            </div>
            <h3>Tecnologia de Drones no Campo</h3>
        </div>
    </div>
</section>

<div id="video-modal" class="modal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <iframe id="video-frame" width="100%" height="450" frameborder="0" allowfullscreen></iframe>
    </div>
</div>
